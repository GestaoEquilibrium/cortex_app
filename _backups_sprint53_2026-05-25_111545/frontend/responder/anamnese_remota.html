<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Formulário Pré-Avaliação · Equilibrium Neuropsicologia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="responder.css">
    <link rel="stylesheet" href="anamnese_remota.css">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="manifest" href="../site.webmanifest">
</head>
<body>

    <!-- HEADER FIXO -->
    <header class="responder-header">
        <div class="responder-header-inner">
            <div class="responder-logo">
                <div class="responder-logo-mark">E</div>
                <span class="responder-logo-text">Equilibrium</span>
            </div>
            <div class="responder-progresso" id="header-progresso" style="display:none;">
                <span class="responder-progresso-label" id="header-progresso-label">Etapa 1 de 5</span>
                <div class="responder-progresso-bar">
                    <div class="responder-progresso-fill" id="header-progresso-fill" style="width: 0%;"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="responder-main">
        <div id="responder-conteudo">
            <div class="tela-loading">
                <div class="tela-loading-spinner"></div>
                <p>Carregando formulário…</p>
            </div>
        </div>
    </main>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>

    <script>
        // Cliente Supabase mínimo (anon)
        window.cortexClient = window.supabase.createClient(
            SUPABASE_CONFIG.url,
            SUPABASE_CONFIG.anonKey,
            { auth: { persistSession: false } }
        );
    </script>

    <script src="anamnese_remota_perguntas.js"></script>
    <script src="anamnese_remota.js"></script>
</body>
</html>
