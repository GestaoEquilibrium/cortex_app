<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0c1f3f">
    <title>Trocar senha — Portal Equilibrium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.21.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="portal.css">
    <link rel="icon" type="image/svg+xml" href="../frontend/favicon.svg">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Equilibrium">
</head>
<body class="portal-bg-grad">

    <div class="login-wrap">
        <div class="login-card">

            <div class="login-logo-wrap">
                <div class="login-logo"><i class="ti ti-lock"></i></div>
                <div class="login-title" id="titulo">Defina sua nova senha</div>
                <div class="login-sub" id="subtitulo">
                    Este é seu primeiro acesso. Por segurança, escolha uma senha pessoal.
                </div>
            </div>

            <div id="alerta" class="alerta" style="display:none;"></div>

            <form id="form-senha" class="form">
                <div class="form-group">
                    <label for="nova-senha">Nova senha</label>
                    <input type="password" id="nova-senha" placeholder="Mínimo 6 caracteres"
                           minlength="6" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label for="confirma-senha">Confirme a nova senha</label>
                    <input type="password" id="confirma-senha" placeholder="Repita a senha"
                           minlength="6" autocomplete="new-password" required>
                </div>

                <button type="submit" id="btn-trocar" class="btn-primary">
                    <i class="ti ti-check" aria-hidden="true"></i>
                    Salvar nova senha
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../frontend/config.js"></script>
    <script src="portal_trocar_senha.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .catch(err => console.warn('SW falhou:', err));
            });
        }
    </script>
</body>
</html>
