<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTEX — Acessar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        /* ============================================================================
           LOGIN — layout centralizado com card flutuante
           ============================================================================ */

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-shell {
            width: 100%;
            max-width: 440px;
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-lg);
            padding: 40px 36px;
            position: relative;
            overflow: hidden;
        }

        /* Glow sutil no canto superior do card (azul → verde) */
        .login-shell::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(30, 64, 175, 0.10) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-shell::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(5, 150, 105, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-content {
            position: relative;
            z-index: 1;
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .login-brand-logo {
            width: 56px;
            height: 56px;
            color: var(--primary-blue);
            background: linear-gradient(135deg, var(--primary-blue-50) 0%, var(--primary-green-50) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .login-brand-name {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .login-tagline {
            font-size: 12.5px;
            color: var(--color-text-muted);
            text-align: center;
            letter-spacing: 0.02em;
            margin-top: -8px;
            margin-bottom: 26px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .login-form .form-group {
            gap: 6px;
        }

        .login-form .form-input {
            padding: 11px 14px;
            font-size: 14px;
        }

        #login-button {
            margin-top: 6px;
            padding: 12px 18px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-dark) 100%);
            color: white;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            font-family: var(--font-body);
        }

        #login-button:hover:not(:disabled) {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        #login-button:active {
            transform: scale(0.98);
        }

        #login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #error-message {
            padding: 11px 14px;
            background: var(--color-danger-bg);
            color: var(--color-danger-text);
            border-radius: var(--radius-md);
            font-size: 12.5px;
            border-left: 3px solid var(--color-danger-text);
            line-height: 1.5;
        }

        .login-footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--color-border);
            text-align: center;
            font-size: 11px;
            color: var(--color-text-soft);
            line-height: 1.6;
        }

        .login-badges {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .login-badge {
            padding: 3px 9px;
            background: var(--slate-50);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-size: 10px;
            color: var(--color-text-muted);
            font-weight: 600;
            letter-spacing: 0.04em;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
</head>
<body>
    <div class="login-shell">
        <div class="login-content">
            <div class="login-brand">
                <div class="login-brand-logo">
                    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 5 C11 5, 7 8, 6.5 12.5 C5 13, 4 14.5, 4 16.5 C4 18.5, 5 20, 6.5 20.5 C7 24, 9.5 26, 12 26.5 L12 22 C10.5 22, 9 21, 9 19"/>
                        <path d="M16 5 C21 5, 25 8, 25.5 12.5 C27 13, 28 14.5, 28 16.5 C28 18.5, 27 20, 25.5 20.5 C25 24, 22.5 26, 20 26.5 L20 22 C21.5 22, 23 21, 23 19"/>
                        <line x1="16" y1="5" x2="16" y2="28"/>
                        <path d="M11 11 C12 12, 13 12, 14 11"/>
                        <path d="M18 11 C19 12, 20 12, 21 11"/>
                        <line x1="10" y1="16" x2="13" y2="16"/>
                        <line x1="19" y1="16" x2="22" y2="16"/>
                        <path d="M11 21 C12 22, 13 22, 14 21"/>
                        <path d="M18 21 C19 22, 20 22, 21 21"/>
                    </svg>
                </div>
                <div class="login-brand-name">CORTEX</div>
            </div>

            <p class="login-tagline">Sistema clínico de neuropsicologia</p>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">E-mail</label>
                    <input type="email" id="email" class="form-input" placeholder="seu@email.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <div id="error-message" style="display: none;"></div>

                <button type="submit" id="login-button">
                    <span class="btn-text">Entrar</span>
                    <span class="btn-loading" style="display: none;">Verificando...</span>
                </button>
            </form>

            <div class="login-footer">
                <div>Acesso restrito · Conformidade LGPD · CFP 06/2019</div>
                <div class="login-badges">
                    <span class="login-badge">Auditoria imutável</span>
                    <span class="login-badge">RLS</span>
                    <span class="login-badge">Criptografia</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
