<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasta do paciente — CORTEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/pacientes.css">
    <link rel="stylesheet" href="../anamnese/anamnese.css">
    <link rel="stylesheet" href="../hipoteses/hipoteses.css">
    <link rel="stylesheet" href="../relatorio_escolar/relatorio_escolar.css">
    <link rel="stylesheet" href="../checklist/checklist.css">
    <link rel="stylesheet" href="../bateria/bateria.css">
    <style>
    /* Sprint 8: Modais Agendar Sessão + Designar Aplicador */
    .sprint8-modal {
        position: fixed; inset: 0;
        background: rgba(15, 23, 42, .55);
        backdrop-filter: blur(2px);
        z-index: 10000;
        display: flex; align-items: center; justify-content: center;
        padding: 20px;
    }
    .sprint8-modal-box {
        background: white;
        border-radius: 14px;
        max-width: 760px; width: 100%;
        max-height: 90vh; overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .sprint8-modal-header {
        padding: 18px 24px;
        border-bottom: 1px solid #e2e8f0;
        display: flex; justify-content: space-between; align-items: center;
        gap: 14px;
        position: sticky; top: 0; background: white; z-index: 1;
    }
    .sprint8-modal-header h3 { margin: 0; font-size: 16px; font-weight: 700; }
    .sprint8-modal-close {
        background: none; border: none; font-size: 18px;
        color: #64748b; cursor: pointer;
        padding: 4px 10px; border-radius: 6px;
        transition: background .15s;
    }
    .sprint8-modal-close:hover { background: #f1f5f9; }

    #sprint8-form-sessao { padding: 18px 24px 22px; }

    .sprint8-bloco { margin-bottom: 18px; }
    .sprint8-bloco-label {
        font-size: 11px; font-weight: 700; color: #64748b;
        text-transform: uppercase; letter-spacing: .07em;
        margin-bottom: 10px; display: block;
    }
    .sprint8-form-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .sprint8-field { display: flex; flex-direction: column; }
    .sprint8-field label {
        font-size: 12px; color: #475569; margin-bottom: 4px; font-weight: 600;
    }
    .sprint8-field input,
    .sprint8-field select,
    .sprint8-field textarea {
        padding: 9px 12px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color .15s, box-shadow .15s;
        resize: vertical;
    }
    .sprint8-field input:focus,
    .sprint8-field select:focus,
    .sprint8-field textarea:focus {
        outline: none; border-color: #1a56db;
        box-shadow: 0 0 0 3px rgba(26,86,219,.1);
    }

    /* Cards de data (calendário simples) */
    .sprint8-datas-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
        gap: 8px;
    }
    .sprint8-data-card {
        background: white; border: 1.5px solid #e2e8f0;
        border-radius: 10px; padding: 10px 6px;
        cursor: pointer;
        transition: all .15s;
        font-family: inherit;
        display: flex; flex-direction: column; align-items: center; gap: 2px;
        position: relative;
    }
    .sprint8-data-card:hover { border-color: #1a56db; transform: translateY(-1px); }
    .sprint8-data-card.active {
        background: #1a56db; color: white; border-color: #1a56db;
        box-shadow: 0 4px 10px rgba(26,86,219,.3);
    }
    .sprint8-data-dia-semana { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: .8; }
    .sprint8-data-numero { font-size: 20px; font-weight: 800; line-height: 1; }
    .sprint8-data-mes { font-size: 10px; opacity: .8; text-transform: uppercase; }
    .sprint8-data-hoje {
        position: absolute; top: 3px; right: 3px;
        font-size: 8px; font-weight: 800;
        background: #fbbf24; color: white;
        padding: 1px 4px; border-radius: 4px;
    }
    .sprint8-data-card.active .sprint8-data-hoje { background: #fbbf24; }

    /* Lista de horários ocupados */
    .sprint8-ocupados-lista {
        display: flex; flex-direction: column; gap: 6px;
        max-height: 200px; overflow-y: auto;
        background: #fef3c7; border: 1px solid #fde68a;
        border-radius: 8px; padding: 10px;
    }
    .sprint8-ocupado-item {
        display: flex; gap: 12px; align-items: center;
        background: white; border-radius: 6px; padding: 8px 10px;
        font-size: 12px;
    }
    .sprint8-ocupado-hora {
        font-weight: 800; color: #92400e;
        flex-shrink: 0; min-width: 80px;
    }
    .sprint8-ocupado-info { flex: 1; min-width: 0; }
    .sprint8-ocupado-meta { font-size: 11px; color: #78716c; margin-top: 1px; }

    .sprint8-erro {
        padding: 10px 14px;
        background: #fef2f2; color: #b91c1c;
        border-radius: 8px; font-size: 13px;
        margin: 12px 0; border-left: 3px solid #b91c1c;
    }
    .sprint8-actions {
        display: flex; justify-content: flex-end; gap: 8px;
        margin-top: 18px; padding-top: 14px;
        border-top: 1px solid #e2e8f0;
    }

    /* Modal Designar — lista de aplicadores */
    .sprint8-aplicadores-lista {
        display: flex; flex-direction: column; gap: 6px;
    }
    .sprint8-aplicador-opcao {
        display: flex; align-items: center; gap: 12px;
        width: 100%; text-align: left;
        background: white; border: 1.5px solid #e2e8f0;
        border-radius: 10px; padding: 12px 14px;
        cursor: pointer; font-family: inherit;
        transition: all .15s;
    }
    .sprint8-aplicador-opcao:hover:not(:disabled) {
        border-color: #1a56db; background: #f8fafc;
        transform: translateX(2px);
    }
    .sprint8-aplicador-opcao.atual { background: #f0fdf4; border-color: #059669; cursor: default; }
    .sprint8-aplicador-opcao:disabled { opacity: 1; }
    .sprint8-aplicador-avatar {
        flex-shrink: 0; width: 38px; height: 38px;
        background: #e2e8f0; color: #475569;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 14px;
    }
    .sprint8-aplicador-info { flex: 1; min-width: 0; }
    .sprint8-aplicador-nome { font-size: 13px; font-weight: 700; color: #1e293b; }
    .sprint8-aplicador-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .sprint8-aplicador-tag {
        font-size: 10px; font-weight: 800;
        background: #059669; color: white;
        padding: 3px 8px; border-radius: 10px;
        flex-shrink: 0;
    }
    .sprint8-aplicador-acao {
        font-size: 11px; font-weight: 700; color: #1a56db;
        flex-shrink: 0;
    }

    @media (max-width: 720px) {
        .sprint8-form-grid { grid-template-columns: 1fr; }
    }
    </style>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="manifest" href="../site.webmanifest">
</head>
<body>
    <div class="app-shell">
        <div id="sidebar-container"></div>

        <main class="app-main">
            <a href="lista.html" class="page-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Voltar à lista de pacientes
            </a>

            <div id="pasta-conteudo">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Carregando paciente...</p>
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="foto-input-hidden" accept="image/jpeg,image/png,image/webp" style="display:none">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Sprint 17 — pra gerar PDF de anamnese remota -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../config.js"></script>
    <script src="../shared/supabase_client.js"></script>
    <script src="../shared/auth_guard.js"></script>
    <script src="../shared/audit.js"></script>
    <script src="../shared/avatar.js"></script>
    <script src="../shared/ui_helpers.js"></script>
    <script src="../shared/sidebar.js"></script>

    <script>
    let pacienteId = null;
    let paciente = null;
    let etapaAtual = 'visao_geral';
    let anamneseExistente = null;
    let hipoteseExistente = null;
    let relatorioEscolarExistente = null;
    let checklistInfo = null;
    let bateriaInfo = null;
    let ehAdmin = false;          // Sprint 8: controla botão Designar
    let aplicadorAtivo = null;    // Sprint 8: vínculo paciente↔aplicador atual
    let respostasRemotas = [];    // Sprint 17: anamneses_remotas pendentes/respondidas

    const ETAPAS = [
        { id: 'visao_geral', label: 'Visão geral' },
        { id: 'anamnese', label: 'Anamnese' },
        { id: 'hipoteses', label: 'Hipóteses' },
        { id: 'checklist', label: 'Checklist' },
        { id: 'bateria', label: 'Bateria' },
        { id: 'correcao', label: 'Correção' },
        { id: 'laudo', label: 'Laudo' },
        { id: 'devolutiva', label: 'Devolutiva' }
    ];

    window.addEventListener('cortex:auth-ready', async () => {
        await CortexSidebar.render('pacientes');

        // Sprint 8: detecta admin pra mostrar botão Designar
        const perfil = window.cortexProfissional?.perfil;
        ehAdmin = (perfil === 'admin_clinico' || perfil === 'admin_gestor');

        const urlParams = new URLSearchParams(window.location.search);
        pacienteId = urlParams.get('id');

        if (!pacienteId) {
            mostrarErroPasta('Paciente não especificado');
            return;
        }

        await carregarPaciente();
    });

    async function carregarPaciente() {
        const { data, error } = await window.cortexClient
            .from('vw_pacientes_lista')
            .select('*')
            .eq('id', pacienteId)
            .single();

        if (error || !data) {
            mostrarErroPasta('Paciente não encontrado');
            return;
        }

        paciente = data;
        await CortexAudit.log('leitura', 'pacientes', pacienteId, { pacienteId });

        await Promise.all([
            carregarAnamnese(),
            carregarHipotese(),
            carregarRelatorioEscolar(),
            carregarChecklistInfo(),
            carregarBateriaInfo(),
            carregarAplicadorAtivo(),
            carregarRespostasRemotas()
        ]);
        renderizarPasta();
    }

    // Sprint 17: carrega anamneses remotas pendentes/respondidas pra mostrar na aba Anamnese
    async function carregarRespostasRemotas() {
        const { data, error } = await window.cortexClient
            .from('anamneses_remotas')
            .select('id, status, respostas, quem_respondeu, nome_respondente, data_envio, data_resposta')
            .eq('paciente_id', pacienteId)
            .in('status', ['aguardando_resposta', 'respondida'])
            .order('data_envio', { ascending: false });
        if (!error && Array.isArray(data)) {
            respostasRemotas = data;
        }
    }

    // Sprint 8: carrega vínculo ativo paciente↔aplicador
    async function carregarAplicadorAtivo() {
        const { data, error } = await window.cortexClient
            .from('vinculos_paciente_aplicador')
            .select(`
                id, paciente_id, aplicador_id, data_inicio, motivo_atribuicao, ativo, atribuido_por,
                aplicador:profissionais!vinculos_paciente_aplicador_aplicador_id_fkey (
                    id, nome_completo, crp, email, foto_url
                )
            `)
            .eq('paciente_id', pacienteId)
            .eq('ativo', true)
            .order('data_inicio', { ascending: false })
            .limit(1)
            .maybeSingle();

        if (!error && data) aplicadorAtivo = data;
        else aplicadorAtivo = null;
    }

    async function carregarAnamnese() {
        const { data, error } = await window.cortexClient
            .from('anamneses')
            .select('id, faixa_etaria, status, created_at, updated_at, aprovado_em')
            .eq('paciente_id', pacienteId)
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();

        if (!error && data) anamneseExistente = data;
    }

    async function carregarHipotese() {
        const { data, error } = await window.cortexClient
            .from('hipoteses')
            .select('id, hipoteses_iniciais, cids_sugeridos, instrumentos_sugeridos, aprovado_em, created_at, updated_at')
            .eq('paciente_id', pacienteId)
            .maybeSingle();

        if (!error && data) hipoteseExistente = data;
    }

    async function carregarRelatorioEscolar() {
        const { data, error } = await window.cortexClient
            .from('relatorios_escolares')
            .select('id, observacoes_educadores, created_at, updated_at')
            .eq('paciente_id', pacienteId)
            .maybeSingle();

        if (!error && data) relatorioEscolarExistente = data;
    }

    async function carregarChecklistInfo() {
        // O "checklist" reaproveita instrumentos_sugeridos da tabela hipoteses.
        // Aqui só queremos saber o total de instrumentos selecionados.
        const { data, error } = await window.cortexClient
            .from('hipoteses')
            .select('id, instrumentos_sugeridos, updated_at')
            .eq('paciente_id', pacienteId)
            .maybeSingle();

        if (!error && data) {
            checklistInfo = {
                total: (data.instrumentos_sugeridos || []).length,
                updated_at: data.updated_at,
                hipoteseId: data.id
            };
        }
    }

    async function carregarBateriaInfo() {
        const { data, error } = await window.cortexClient
            .from('aplicacoes_instrumento')
            .select('id, status, updated_at')
            .eq('paciente_id', pacienteId);

        if (!error && data && data.length > 0) {
            const stats = { total: data.length, aguardando: 0, em_aplicacao: 0, concluido: 0 };
            data.forEach(a => {
                if (a.status === 'aguardando') stats.aguardando++;
                else if (a.status === 'em_aplicacao') stats.em_aplicacao++;
                else if (['concluido_aplicacao', 'em_correcao', 'corrigido', 'integrado_laudo'].includes(a.status)) stats.concluido++;
            });
            const ultimaAtualizacao = data.reduce((max, a) =>
                a.updated_at > max ? a.updated_at : max, '');
            bateriaInfo = { ...stats, updated_at: ultimaAtualizacao };
        }
    }

    function mostrarErroPasta(msg) {
        document.getElementById('pasta-conteudo').innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div class="empty-state-title">${escapeHtml(msg)}</div>
                <a href="lista.html" class="btn btn-primary">Voltar à lista</a>
            </div>
        `;
    }

    async function renderizarPasta() {
        let signedUrl = null;
        if (paciente.foto_url) {
            signedUrl = await window.CortexAvatar.buscarUrlAssinada(pacienteId, paciente.foto_url);
        }
        const avatar = window.CortexAvatar.render(paciente, { tamanho: 'xl', signedUrl });
        const statusClass = window.CortexUI.STATUS_CLASSES[paciente.status] || 'status-info';
        const statusLabel = window.CortexUI.STATUS_LABELS[paciente.status] || paciente.status;

        const cabecalho = `
            <div class="pasta-cabecalho">
                <div onclick="document.getElementById('foto-input-hidden').click()" style="cursor: pointer;" title="Clique para alterar foto">
                    ${avatar}
                </div>
                <div class="pasta-info">
                    <div class="pasta-nome">${escapeHtml(paciente.nome_completo)}${paciente.nome_social ? ` <span style="font-size: 14px; color: var(--color-text-muted); font-weight: 400;">(${escapeHtml(paciente.nome_social)})</span>` : ''}</div>
                    <div class="pasta-meta">
                        <div class="pasta-meta-item">
                            <span class="pasta-meta-label">Idade:</span>
                            <span class="pasta-meta-valor">${paciente.idade_humanizada}</span>
                        </div>
                        <div class="pasta-meta-item">
                            <span class="pasta-meta-label">Sexo:</span>
                            <span class="pasta-meta-valor">${paciente.sexo}</span>
                        </div>
                        <div class="pasta-meta-item">
                            <span class="pasta-meta-label">Nascimento:</span>
                            <span class="pasta-meta-valor">${window.CortexUI.formatarDataBR(paciente.data_nascimento)}</span>
                        </div>
                        ${paciente.convenio_nome ? `
                            <div class="pasta-meta-item">
                                <span class="pasta-meta-label">Convênio:</span>
                                <span class="pasta-meta-valor">${escapeHtml(paciente.convenio_nome)}</span>
                            </div>
                        ` : ''}
                        ${aplicadorAtivo?.aplicador ? `
                            <div class="pasta-meta-item">
                                <span class="pasta-meta-label">Aplicador:</span>
                                <span class="pasta-meta-valor">${escapeHtml(aplicadorAtivo.aplicador.nome_completo)}${aplicadorAtivo.aplicador.crp ? ` — ${escapeHtml(aplicadorAtivo.aplicador.crp)}` : ''}</span>
                            </div>
                        ` : `
                            <div class="pasta-meta-item">
                                <span class="pasta-meta-label">Aplicador:</span>
                                <span class="pasta-meta-valor" style="color: var(--color-text-muted); font-style: italic;">— não designado —</span>
                            </div>
                        `}
                    </div>
                    <div class="pasta-actions">
                        <span class="badge ${statusClass}">${statusLabel}</span>
                        <a class="btn btn-secondary btn-sm" href="novo.html?id=${pacienteId}">
                            ✏️ Editar dados
                        </a>
                        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('foto-input-hidden').click()">
                            ${paciente.foto_url ? 'Alterar foto' : 'Adicionar foto'}
                        </button>
                        <button class="btn btn-primary btn-sm" onclick="window.CortexPasta.abrirModalAgendar()">+ Agendar sessão</button>
                        <button class="btn btn-secondary btn-sm" onclick="window.CortexPasta.abrirModalCapa()">🖨️ Imprimir capa</button>
                        ${ehAdmin ? `<button class="btn btn-secondary btn-sm" onclick="window.CortexPasta.abrirModalDesignar()">👤 Designar aplicador</button>` : ''}
                    </div>
                </div>
            </div>
        `;

        const etapasComStatus = ETAPAS.map(et => {
            let concluida = false;
            if (et.id === 'anamnese' && anamneseExistente && anamneseExistente.status === 'concluida') {
                concluida = true;
            }
            if (et.id === 'hipoteses' && hipoteseExistente && hipoteseExistente.aprovado_em) {
                concluida = true;
            }
            if (et.id === 'checklist' && checklistInfo && checklistInfo.total > 0) {
                concluida = true;
            }
            if (et.id === 'bateria' && bateriaInfo && bateriaInfo.total > 0 && bateriaInfo.concluido === bateriaInfo.total) {
                concluida = true;
            }
            return { ...et, concluida };
        });

        const etapasHtml = `
            <div class="pasta-etapas">
                ${etapasComStatus.map(et => `
                    <button
                        class="etapa ${et.id === etapaAtual ? 'ativa' : ''} ${et.concluida ? 'concluida' : ''}"
                        onclick="trocarEtapa('${et.id}')"
                    >${et.label}</button>
                `).join('')}
            </div>
        `;

        const conteudoEtapa = renderizarEtapa(etapaAtual);

        document.getElementById('pasta-conteudo').innerHTML = cabecalho + etapasHtml + conteudoEtapa;

        document.getElementById('foto-input-hidden').onchange = uploadFoto;
    }

    function trocarEtapa(novaEtapa) {
        etapaAtual = novaEtapa;
        renderizarPasta();
    }
    window.trocarEtapa = trocarEtapa;

    function renderizarEtapa(etapaId) {
        if (etapaId === 'visao_geral') return renderVisaoGeral();
        if (etapaId === 'anamnese') return renderAnamneseComRelatorio();
        if (etapaId === 'hipoteses') return renderHipoteses();
        if (etapaId === 'checklist') return renderChecklist();
        if (etapaId === 'bateria') return renderBateria();
        if (etapaId === 'correcao') {
            // Dispara carga assíncrona; substitui o conteúdo quando pronto
            setTimeout(() => carregarERenderCorrecao(), 0);
            return `
                <div class="etapa-content" id="correcao-container">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">⏳</div>
                        <h3>Carregando dashboard de correção...</h3>
                    </div>
                </div>
            `;
        }
        if (etapaId === 'laudo') {
            setTimeout(() => carregarERenderLaudo(), 0);
            return `
                <div class="etapa-content" id="laudo-container">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">⏳</div>
                        <h3>Carregando laudos...</h3>
                    </div>
                </div>
            `;
        }
        if (etapaId === 'devolutiva') {
            return `
                <div class="etapa-content">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">🚧</div>
                        <h3>Em construção</h3>
                        <p>A etapa de Devolutiva estará disponível em breve.</p>
                    </div>
                </div>
            `;
        }

        // Qualquer outra etapa não mapeada
        const sprints = {};

        const labelEtapa = ETAPAS.find(e => e.id === etapaId)?.label || etapaId;
        const sprintInfo = sprints[etapaId] || 'próximo sprint';

        return `
            <div class="etapa-content">
                <div class="etapa-placeholder">
                    <div class="etapa-placeholder-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>

    // Helpers (espelham bateria.js — mesma convenção de URL)
    function correcaoSiglaParaSlug(sigla) {
        return String(sigla || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }
    const CORRECAO_URL_OVERRIDES_RESULTADO = {
        'SCARED-A': '../correcao/scared/scared_resultado.html',
        'SCARED-H': '../correcao/scared/scared_resultado.html'
    };
    // Whitelist de retrocompatibilidade (espelha bateria.js — testes legados)
    const CORRECAO_WHITELIST_RESULTADO = ['RAADS-R'];

    function correcaoMontarUrlResultado(sigla, aplicacaoId) {
        let base = CORRECAO_URL_OVERRIDES_RESULTADO[sigla];
        if (!base) {
            const slug = correcaoSiglaParaSlug(sigla);
            if (!slug) return null;
            base = `../correcao/${slug}/${slug}_resultado.html`;
        }
        return `${base}?aplicacao_id=${aplicacaoId}`;
    }

    function correcaoTemPaginaResultado(inst) {
        if (!inst) return false;
        if (CORRECAO_WHITELIST_RESULTADO.includes(inst.sigla)) return true;
        if (inst.tipo_aplicacao === 'presencial') {
            return inst.permite_correcao_sistema === true;
        }
        return inst.permite_aplicacao_online === true
            && inst.permite_correcao_sistema === true;
    }

    async function carregarERenderCorrecao() {
        const container = document.getElementById('correcao-container');
        if (!container) return;

        try {
            const { data, error } = await window.cortexClient
                .from('aplicacoes_instrumento')
                .select(`
                    id, status, modalidade, data_aplicacao, data_conclusao,
                    link_unico, link_acessado_em, updated_at, created_at,
                    instrumentos_catalogo (
                        sigla, nome_completo, tipo_aplicacao,
                        permite_aplicacao_online, permite_correcao_sistema
                    )
                `)
                .eq('paciente_id', pacienteId)
                .order('created_at', { ascending: true });

            if (error) throw error;

            container.innerHTML = renderCorrecao(data || []);
        } catch (err) {
            console.error('[correcao] erro ao carregar:', err);
            container.innerHTML = `
                <div class="etapa-placeholder">
                    <div class="etapa-placeholder-icon">⚠</div>
                    <h3>Erro ao carregar</h3>
                    <p>${escapeHtml(err.message || 'erro desconhecido')}</p>
                </div>

        const onlineAguardando = [];

        for (const apl of aplicacoes) {
            const inst = apl.instrumentos_catalogo;
            const sigla = inst?.sigla || '?';
            const ehOnline = apl.modalidade === 'online'

    function bindLaudoUpload() {
        const btn = document.getElementById('btn-laudo-upload');
        const input = document.getElementById('laudo-file-input');
        if (!btn || !input) return;
        btn.addEventListener('click', () => input.click());
        input.addEventListener('change', uploadLaudo);
    }

    async function uploadLaudo(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Validações
        if (file.type !== 'application/pdf') {
            window.CortexUI.toast('Apenas arquivos PDF são aceitos.', 'danger');
            event.target.value = '';
            return;
        }
        if (file.size > 20 * 1024 * 1024) {
            window.CortexUI.toast('Arquivo muito grande. Máximo: 20MB.', 'danger');
            event.target.value = '';
            return;
        }

        const btn = document.getElementById('btn-laudo-upload');
        const orig = btn.textContent;
        btn.disabled = true;
        btn.textContent = '⏳ Enviando...';

        try {
            // Path: <paciente_id>/v<timestamp>.pdf
            const ts = Date.now();
            const path = `${pacienteId}/v${ts}.pdf`;

            // 1. Upload no Storage
            const { error: uploadError } = await window.cortexClient
                .storage
                .from('laudos')
                .upload(path, file, { contentType: 'application/pdf', upsert: false });
            if (uploadError) throw uploadError;

            // 2. INSERT em laudos_paciente (versao auto via trigger; ativo=true por default)
            const { data: { user } } = await window.cortexClient.auth.getUser();
            const { error: insertError } = await window.cortexClient
                .from('laudos_paciente')
                .insert({
                    paciente_id: pacienteId,
                    arquivo_path: path,
                    arquivo_nome_original: file.name,
                    arquivo_tamanho_bytes: file.size,
                    ativo: true,
                    created_by: user?.id || null,
                });
            if (insertError) throw insertError;

            await CortexAudit.log('upload', 'laudos_paciente', pacienteId, {
                pacienteId,
                detalhes: { nome: file.name, tamanho: file.size }
            });

            window.CortexUI.toast('Laudo enviado com sucesso!', 'success');

            // Reload da lista
            await carregarERenderLaudo();

        } catch (err) {
            console.error('[laudo] erro upload:', err);
            window.CortexUI.toast('Erro ao enviar laudo: ' + (err.message || 'desconhecido'), 'danger');
        } finally {
            btn.disabled = false;
            btn.textContent = orig;
            event.target.value = '';
        }
    }

    // API global pros botões inline (visualizar/baixar/definir/remover)
    window.CortexLaudo = {
        visualizar: async function(laudoId) {
            try {
                const laudo = (laudosCache || []).find(l => l.id === laudoId);
                if (!laudo) throw new Error('Laudo não encontrado');

                const { data, error } = await window.cortexClient
                    .storage
                    .from('laudos')
                    .createSignedUrl(laudo.arquivo_path, 600);  // 10 min
                if (error || !data) throw error || new Error('URL não gerada');

                // Abre modal com iframe do PDF
                abrirModalLaudo(laudo, data.signedUrl);
            } catch (err) {
                console.error('[laudo] visualizar:', err);
                window.CortexUI.toast('Erro ao visualizar: ' + (err.message || 'desconhecido'), 'danger');
            }
        },

        baixar: async function(laudoId) {
            try {
                const laudo = (laudosCache || []).find(l => l.id === laudoId);
                if (!laudo) throw new Error('Laudo não encontrado');

                const { data, error } = await window.cortexClient
                    .storage
                    .from('laudos')
                    .createSignedUrl(laudo.arquivo_path, 60, { download: laudo.arquivo_nome_original || 'laudo.pdf' });
                if (error || !data) throw error || new Error('URL não gerada');

                window.location.href = data.signedUrl;
            } catch (err) {
                console.error('[laudo] baixar:', err);
                window.CortexUI.toast('Erro ao baixar: ' + (err.message || 'desconhecido'), 'danger');
            }
        },

        definirAtual: async function(laudoId) {
            if (!confirm('Definir esta versão como a atual? A versão atual passa a ser histórico.')) return;
            try {
                // Trigger laudos_unique_ativo cuida de marcar as outras como false
                const { error } = await window.cortexClient
                    .from('laudos_paciente')
                    .update({ ativo: true })
                    .eq('id', laudoId);
                if (error) throw error;

                window.CortexUI.toast('Versão definida como atual.', 'success');
                await carregarERenderLaudo();
            } catch (err) {
                console.error('[laudo] definirAtual:', err);
                window.CortexUI.toast('Erro: ' + (err.message || 'desconhecido'), 'danger');
            }
        },

        remover: async function(laudoId) {
            const laudo = (laudosCache || []).find(l => l.id === laudoId);
            if (!laudo) return;
            if (!confirm(`Remover permanentemente a versão v${laudo.versao}? Esta ação não pode ser desfeita.`)) return;
            try {
                // 1. Remove do Storage
                await window.cortexClient.storage.from('laudos').remove([laudo.arquivo_path]);
                // 2. Remove da tabela
                const { error } = await window.cortexClient
                    .from('laudos_paciente')
                    .delete()
                    .eq('id', laudoId);
                if (error) throw error;

                await CortexAudit.log('remocao', 'laudos_paciente', pacienteId, {
                    pacienteId,
                    detalhes: { versao: laudo.versao }
                });

                window.CortexUI.toast('Versão removida.', 'success');
                await carregarERenderLaudo();
            } catch (err) {
                console.error('[laudo] remover:', err);
                window.CortexUI.toast('Erro: ' + (err.message || 'desconhecido'), 'danger');
            }
        }
    };

    function abrirModalLaudo(laudo, signedUrl) {
        // Cria modal full-screen com iframe do PDF
        const modal = document.createElement('div');
        modal.className = 'laudo-modal';
        modal.innerHTML = `
            <div class="laudo-modal-header">
                <div class="laudo-modal-titulo">
                    <strong>Laudo v${laudo.versao}</strong>
                    <span class="laudo-modal-meta">${escapeHtml(laudo.arquivo_nome_original || '')}</span>
                </div>
                <div class="laudo-modal-acoes">
                    <button class="btn btn-secondary btn-sm" onclick="window.CortexLaudo.baixar('${laudo.id}')">⬇ Baixar</button>
                    <button class="btn btn-ghost btn-sm" onclick="this.closest('.laudo-modal').remove()">✕ Fechar</button>
                </div>
            </div>
            <iframe class="laudo-modal-iframe" src="${signedUrl}" title="Laudo PDF"></iframe>
        `;
        document.body.appendChild(modal);

        // ESC fecha
        const escHandler = (e) => {
            if (e.key === 'Escape') { modal.remove(); document.removeEventListener('keydown', escHandler); }
        };
        document.addEventListener('keydown', escHandler);
    }

    function formatarBytes(bytes) {
        if (bytes == null) return '—';
        const kb = bytes / 1024;
        if (kb < 1024) return `${kb.toFixed(0)} KB`;
        return `${(kb / 1024).toFixed(2)} MB`;
    }

        return respostasRemotas.map(ar => {
            const isResp = ar.status === 'respondida';
            const dataEnv = new Date(ar.data_envio).toLocaleDateString('pt-BR');
            const dataResp = ar.data_resposta ? new Date(ar.data_resposta).toLocaleDateString('pt-BR') : null;

    // Mantém os tokens em cache pra reuso ao "Copiar link"
    const _tokensRemotosCache = {};

    async function enviarAnamneseRemota() {
        try {
            const { data, error } = await window.cortexClient
                .rpc('criar_anamnese_remota', { p_paciente_id: pacienteId });
            if (error) throw error;
            const linha = Array.isArray(data) ? data[0] : data;
            if (!linha || !linha.novo_token) throw new Error('Não retornou token');

            const base = window.location.origin + window.location.pathname.replace(/pacientes\/pasta\.html$/, '');
            const link = `${base}responder/anamnese_remota.html?token=${linha.novo_token}`;

            // Guarda o token pra reuso (Copiar link no card pendente)
            _tokensRemotosCache[linha.anamnese_remota_id] = linha.novo_token;

            mostrarModalLinkRemoto(link);

            // Recarrega lista pra mostrar o card "aguardando resposta"
            await carregarRespostasRemotas();
            renderizarPasta();
        } catch (err) {
            console.error('Erro ao gerar link remoto:', err);
            window.CortexUI.toast('Erro ao gerar link: ' + (err.message || ''), 'danger');
        }
    }

    async function copiarLinkRemoto(arId) {
        // Se temos o token em cache (mesma sessão), usa; senão, regenera não dá — token só vem na criação.
        // Solução: como o token está só no banco do paciente que vai abrir, não dá pra recuperar pelo painel.
        // Avisa o usuário se não temos cache.
        const token = _tokensRemotosCache[arId];
        if (!token) {
            alert('Não consigo recuperar o link desta sessão antiga. Por segurança, o token só está disponível no momento da geração.\n\nSe precisar enviar de novo, cancele este envio e gere um novo formulário remoto.');
            return;
        }
        const base = window.location.origin + window.location.pathname.replace(/pacientes\/pasta\.html$/, '');
        const link = `${base}responder/anamnese_remota.html?token=${token}`;
        mostrarModalLinkRemoto(link);
    }

        return escapeHtml(String(v)).replace(/\n/g, '<br>');

    async function gerarPdfAnamneseRemota(ar) {
        if (!window.html2canvas || !window.jspdf) {
            window.CortexUI.toast('Biblioteca de PDF ainda carregando, tente em 2 segundos...', 'info');
            return;
        }

        const btn = document.getElementById('btn-baixar-pdf-anamnese-remota');
        const txtOriginal = btn ? btn.textContent : '';
        if (btn) { btn.disabled = true; btn.textContent = '⏳ Gerando...'; }

        try {
            const el = document.getElementById('pdf-anamnese-remota-conteudo');
            if (!el) throw new Error('Elemento do documento não encontrado');

            const canvas = await window.html2canvas(el, {
                scale: 2,
                backgroundColor: '#ffffff',
                useCORS: true,
                logging: false
            });

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pdfWidth = 210, pdfHeight = 297;
            const imgHeight = (canvas.height * pdfWidth) / canvas.width;

            if (imgHeight <= pdfHeight) {
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, pdfWidth, imgHeight);
            } else {
                let posY = 0, restante = imgHeight;
                while (restante > 0) {
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, -posY, pdfWidth, imgHeight);
                    restante -= pdfHeight;
                    posY += pdfHeight;
                    if (restante > 0) pdf.addPage();
                }
            }

            const nomeAbreviado = (paciente.nome_completo || 'PACIENTE').toUpperCase()
                .replace(/[^A-Z\s]/g, '').trim().substring(0, 50);
            const d = new Date();
            const dataStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const nomeArquivo = `Anamnese Remota - ${nomeAbreviado}_${dataStr}.pdf`;

            pdf.save(nomeArquivo);
            window.CortexUI.toast('PDF gerado com sucesso', 'success');
        } catch (err) {
            console.error('Erro ao gerar PDF:', err);
            window.CortexUI.toast('Erro ao gerar PDF: ' + err.message, 'danger');
        } finally {
            if (btn) { btn.disabled = false; btn.textContent = txtOriginal; }
        }
    }

    async function cancelarRemotaPasta(arId) {
        if (!confirm('Cancelar este envio? O link parará de funcionar e não será mais possível receber as respostas.')) return;
        try {
            const { error } = await window.cortexClient
                .from('anamneses_remotas')
                .update({ status: 'cancelada' })
                .eq('id', arId);
            if (error) throw error;
            await carregarRespostasRemotas();
            renderizarPasta();
            window.CortexUI.toast('Envio cancelado.', 'info');
        } catch (err) {
            window.CortexUI.toast('Erro: ' + err.message, 'danger');
        }
    }

    function formatarDataHora(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yyyy = d.getFullYear();
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${dd}/${mm}/${yyyy} às ${hh}:${mi}`;
    }

    async function uploadFoto(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (file.size > 2 * 1024 * 1024) {
            window.CortexUI.toast('Arquivo muito grande. Máximo: 2MB.', 'danger');
            return;
        }

        if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
            window.CortexUI.toast('Formato não suportado. Use JPG, PNG ou WEBP.', 'danger');
            return;
        }

        window.CortexUI.toast('Enviando foto...', 'info');

        const ext = file.name.split('.').pop().toLowerCase();
        const path = `${pacienteId}/perfil.${ext}`;

        try {
            const { error: uploadError } = await window.cortexClient
                .storage
                .from('pacientes-fotos')
                .upload(path, file, { upsert: true, contentType: file.type });

            if (uploadError) throw uploadError;

            const { error: updateError } = await window.cortexClient
                .from('pacientes')
                .update({ foto_url: path })
                .eq('id', pacienteId);

            if (updateError) throw updateError;

            await CortexAudit.log('edicao', 'pacientes', pacienteId, {
                pacienteId,
                detalhes: { campo: 'foto_url' }
            });

            window.CortexUI.toast('Foto enviada com sucesso!', 'success');

            paciente.foto_url = path;
            renderizarPasta();

        } catch (err) {
            console.error('Erro no upload:', err);
            window.CortexUI.toast('Erro ao enviar foto: ' + err.message, 'danger');
        }
    }

    // FIX timezone: parser manual para "YYYY-MM-DD"
    function sprint16FmtData(iso) {
        if (!iso) return '—';
        try {
            const s = String(iso).slice(0, 10);
            const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
            if (m) {
                const [, y, mo, d] = m;
                return `${d}/${mo}/${y}`;
            }
            const dt = new Date(iso);
            return dt.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
        } catch { return '—'; }
    }

    // Pré-processa a foto: baixa, recorta em quadrado central (cover), redimensiona.
    // Resolve dois problemas do html2canvas:
    //   1) object-fit:cover não respeitado em <img> (deforma a foto)
    //   2) background-image renderiza em baixa resolução
    // Saída: data URL PNG quadrado de alta qualidade, pronto pra <img>.
    async function sprint16PreprocessarFoto(signedUrl, tamanhoPx) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                try {
                    // Tamanho de saída: 3x o tamanho final pra ter resolução de impressão (~240px → 720px)
                    const outSize = tamanhoPx * 3;
                    const canvas = document.createElement('canvas');
                    canvas.width = outSize;
                    canvas.height = outSize;
                    const ctx = canvas.getContext('2d');

                    // Lógica do "cover": calcula o lado menor e recorta o centro
                    const srcW = img.naturalWidth;
                    const srcH = img.naturalHeight;
                    const srcSize = Math.min(srcW, srcH);
                    const srcX = (srcW - srcSize) / 2;
                    const srcY = (srcH - srcSize) / 2;

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, srcX, srcY, srcSize, srcSize, 0, 0, outSize, outSize);

                    resolve(canvas.toDataURL('image/jpeg', 0.92));
                } catch (err) {
                    reject(err);
                }
            };
            img.onerror = () => reject(new Error('Falha ao carregar foto'));
            img.src = signedUrl;
        });
    }

    function sprint16MontarHtmlCapa(fotoSignedUrl) {
        const p = paciente || {};
        const aplic = aplicadorAtivo?.aplicador || null;

        const nome = (p.nome_completo || '—').toUpperCase();
        const inicio = sprint16FmtData(p.created_at);
        const cpf = p.cpf || '—';
        const dn = sprint16FmtData(p.data_nascimento);
        const idade = p.idade_humanizada || '—';

    async function sprint16GerarPdfCapa() {
        if (!window.html2canvas || !window.jspdf) {
            window.CortexUI.toast('Biblioteca de PDF ainda carregando, tente em 2 segundos...', 'info');
            return;
        }

        const btn = document.getElementById('btn-baixar-pdf-capa');
        const txtOriginal = btn ? btn.textContent : '';
        if (btn) { btn.disabled = true; btn.textContent = '⏳ Gerando...'; }

        try {
            const el = document.getElementById('pdf-capa-prontuario-conteudo');
            if (!el) throw new Error('Elemento da capa não encontrado');

            // Aguarda imagens internas carregarem (logo, turbinas, foto)
            const imgs = el.querySelectorAll('img');
            await Promise.all(Array.from(imgs).map(img => {
                if (img.complete && img.naturalHeight !== 0) return Promise.resolve();
                return new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve;
                    setTimeout(resolve, 2000);
                });
            }));

            // RENDER ALTA QUALIDADE — dimensões fixas + scale 3.
            // O fix do deslocamento lateral agora é feito no pdf.addImage abaixo
            // (calcula proporção real e centraliza), então podemos forçar width/height
            // sem causar margem branca.
            const canvas = await window.html2canvas(el, {
                scale: 3,
                backgroundColor: '#ffffff',
                useCORS: true,
                allowTaint: true,
                logging: false,
                width: 720,
                height: 1018,
                windowWidth: 720,
                windowHeight: 1018
            });

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4',
                compress: true
            });

            // Calcula proporção real do canvas e centraliza no A4 (210×297mm)
            // Antes: forçava 210×297, mas canvas pode vir com proporção ligeiramente diferente
            // e gerava deslocamento lateral. Agora respeita o aspect ratio real.
            const pdfWidth = 210, pdfHeight = 297;
            const canvasRatio = canvas.width / canvas.height;
            const pdfRatio = pdfWidth / pdfHeight;
            let imgW, imgH, offsetX, offsetY;
            if (canvasRatio > pdfRatio) {
                // canvas mais largo que A4 → ajusta pela largura
                imgW = pdfWidth;
                imgH = pdfWidth / canvasRatio;
                offsetX = 0;
                offsetY = (pdfHeight - imgH) / 2;
            } else {
                // canvas mais alto que A4 → ajusta pela altura
                imgH = pdfHeight;
                imgW = pdfHeight * canvasRatio;
                offsetX = (pdfWidth - imgW) / 2;
                offsetY = 0;
            }
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', offsetX, offsetY, imgW, imgH, undefined, 'FAST');

            const nomeAbreviado = (paciente.nome_completo || 'PACIENTE').toUpperCase()
                .replace(/[^A-Z\s]/g, '').trim().substring(0, 50);
            const d = new Date();
            const dataStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const nomeArquivo = `Capa Prontuario - ${nomeAbreviado}_${dataStr}.pdf`;

            pdf.save(nomeArquivo);
            window.CortexUI.toast('PDF gerado com sucesso', 'success');

            try {
                await CortexAudit.log('leitura', 'pacientes', pacienteId, {
                    operacao: 'capa_prontuario_pdf_gerado',
                    arquivo: nomeArquivo
                });
            } catch (e) { /* silencioso */ }

        } catch (err) {
            console.error('[sprint16] gerar PDF capa:', err);
            window.CortexUI.toast('Erro ao gerar PDF: ' + (err.message || 'desconhecido'), 'danger');
        } finally {
            if (btn) { btn.disabled = false; btn.textContent = txtOriginal; }
        }
    }

    function sprint8RenderCardData(d) {

    function sprint8DataParaISO(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    async function sprint8CarregarSessoesDoDia(dataISO) {
        const inicio = new Date(dataISO + 'T00:00:00');
        const fim = new Date(dataISO + 'T23:59:59');

        const { data, error } = await window.cortexClient
            .from('sessoes')
            .select(`
                id, data_hora_inicio, data_hora_fim, tipo, status, profissional_id,
                paciente:pacientes!sessoes_paciente_id_fkey ( nome_completo ),
                profissional:profissionais!sessoes_profissional_id_fkey ( nome_completo )
            `)
            .gte('data_hora_inicio', inicio.toISOString())
            .lt('data_hora_inicio', fim.toISOString())
            .neq('status', 'cancelada')
            .order('data_hora_inicio');

        _sprint8SessoesDoDia = (error ? [] : data) || [];
    }

    function sprint8RenderHorariosOcupados() {
        const bloco = document.getElementById('sprint8-bloco-ocupados');
        const lista = document.getElementById('sprint8-ocupados-lista');

            bloco.style.display = 'none';
            return;
        }
        bloco.style.display = 'block';
        lista.innerHTML = _sprint8SessoesDoDia.map(s => {
            const di = new Date(s.data_hora_inicio);
            const df = new Date(s.data_hora_fim);
            const hi = `${String(di.getHours()).padStart(2,'0')}:${String(di.getMinutes()).padStart(2,'0')}`;
            const hf = `${String(df.getHours()).padStart(2,'0')}:${String(df.getMinutes()).padStart(2,'0')}`;
            return `
                <div class="sprint8-ocupado-item">

    async function sprint8SalvarSessao(form) {
        const erro = document.getElementById('sprint8-erro');

        const btn = document.getElementById('sprint8-btn-salvar');
        const btnText = btn.querySelector('.btn-text');
        const btnLoading = btn.querySelector('.btn-loading');

        const data = form.elements['data'].value;
        const horaInicio = form.elements['hora_inicio'].value;
        const horaFim = form.elements['hora_fim'].value;
        const profissionalId = form.elements['profissional_id'].value;
        const tipo = form.elements['tipo'].value;
        const observacoes = form.elements['observacoes'].value || null;

        // Validações
        if (!data) { sprint8MostrarErro(erro, 'Escolha uma data.'); return; }
        if (!horaInicio || !horaFim) { sprint8MostrarErro(erro, 'Preencha hora de início e fim.'); return; }
        if (horaFim <= horaInicio) { sprint8MostrarErro(erro, 'Hora de fim deve ser depois da hora de início.'); return; }
        if (!profissionalId) { sprint8MostrarErro(erro, 'Selecione um profissional.'); return; }
        if (!tipo) { sprint8MostrarErro(erro, 'Selecione o tipo de sessão.'); return; }

        const dtInicio = new Date(`${data}T${horaInicio}:00`);
        const dtFim = new Date(`${data}T${horaFim}:00`);

        // Checa conflito local (na lista que carregamos)
        const conflito = _sprint8SessoesDoDia.find(s => {
            if (s.profissional_id !== profissionalId) return false;
            const sI = new Date(s.data_hora_inicio);
            const sF = new Date(s.data_hora_fim);
            return dtInicio < sF && dtFim > sI;
        });
        if (conflito) {
            const di = new Date(conflito.data_hora_inicio);
            const df = new Date(conflito.data_hora_fim);
            const hi = `${String(di.getHours()).padStart(2,'0')}:${String(di.getMinutes()).padStart(2,'0')}`;
            const hf = `${String(df.getHours()).padStart(2,'0')}:${String(df.getMinutes()).padStart(2,'0')}`;
            if (!confirm(`⚠ Conflito: o profissional já tem sessão das ${hi} às ${hf}. Deseja continuar mesmo assim?`)) {
                return;
            }
        }

        btn.disabled = true;
        btnText.style.display = 'none';
        btnLoading.style.display = 'inline';

        try {
            const { error } = await window.cortexClient
                .from('sessoes')
                .insert({
                    paciente_id: pacienteId,
                    profissional_id: profissionalId,
                    tipo: tipo,
                    status: 'agendada',
                    data_hora_inicio: dtInicio.toISOString(),
                    data_hora_fim: dtFim.toISOString(),
                    observacoes: observacoes,
                });
            if (error) throw error;

            await CortexAudit.log('criacao', 'sessoes', null, {
                pacienteId,
                detalhes: { data: dtInicio.toISOString(), tipo }
            });

            window.CortexUI.toast('✓ Sessão agendada com sucesso!', 'success');
            window.CortexPasta.fecharModal();
        } catch (err) {
            console.error('[sprint8] salvar sessão:', err);
            sprint8MostrarErro(erro, 'Erro ao agendar: ' + (err.message || 'desconhecido'));
            btn.disabled = false;
            btnText.style.display = 'inline';
            btnLoading.style.display = 'none';
        }
    }

    function sprint8MostrarErro(el, msg) {
        el.textContent = msg;
        el.style.display = 'block';
    }

    // ────────────────────────────────────────────────────────────────────────
    // MODAL DESIGNAR APLICADOR (só admin)
    // ────────────────────────────────────────────────────────────────────────

    async function sprint8AbrirModalDesignar() {
        let aplicadores = [];
        try {
            const { data, error } = await window.cortexClient
                .from('profissionais')
                .select('id, nome_completo, crp, perfil, foto_url')
                .eq('ativo', true)
                .in('perfil', ['neuropsicologo_aplicador', 'admin_clinico', 'admin_gestor'])
                .order('nome_completo');
            if (error) throw error;
            aplicadores = data || [];
        } catch (err) {
            window.CortexUI.toast('Erro ao carregar profissionais: ' + err.message, 'danger');
            return;
        }

        const atualId = aplicadorAtivo?.aplicador_id || null;
        const atualNome = aplicadorAtivo?.aplicador?.nome_completo || null;

        const html = `
            <div id="sprint8-modal" class="sprint8-modal">
                <div class="sprint8-modal-box" style="max-width: 560px;">
                    <div class="sprint8-modal-header">
                        <h3>👤 Designar aplicador</h3>
                        <button class="sprint8-modal-close" onclick="window.CortexPasta.fecharModal()">✕</button>
                    </div>

                    <div style="padding: 20px 24px;">
                        <p style="margin: 0 0 12px 0; font-size: 13px; color: var(--color-text-muted);">
                            Defina o profissional responsável por <strong>${escapeHtml(paciente.nome_completo)}</strong>.
                            ${atualNome ? `<br>Atual: <strong>${escapeHtml(atualNome)}</strong>` : ''}
                        </p>

                        <div class="sprint8-aplicadores-lista">
                            ${aplicadores.map(a => sprint8RenderAplicadorOpcao(a, atualId)).join('')}
                        </div>

                        ${atualId ? `
                            <div style="margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--color-border); text-align: right;">
                                <button class="btn btn-ghost btn-sm" style="color: var(--color-danger-text);"
                                        onclick="window.CortexPasta.removerAplicador()">
                                    🗑 Remover designação atual
                                </button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', html);

        const escHandler = (e) => {
            if (e.key === 'Escape') {
                window.CortexPasta.fecharModal();
                document.removeEventListener('keydown', escHandler);
            }
        };
        document.addEventListener('keydown', escHandler);
    }

    function sprint8RenderAplicadorOpcao(a, atualId) {
        const ehAtual = a.id === atualId;
        const inicial = (a.nome_completo || '?').charAt(0).toUpperCase();
        return `
            <button type="button" class="sprint8-aplicador-opcao ${ehAtual ? 'atual' : ''}"
                    onclick="window.CortexPasta.designarAplicador('${a.id}')"
                    ${ehAtual ? 'disabled' : ''}>
                <div class="sprint8-aplicador-avatar">${escapeHtml(inicial)}</div>
                <div class="sprint8-aplicador-info">
                    <div class="sprint8-aplicador-nome">${escapeHtml(a.nome_completo)}</div>
                    <div class="sprint8-aplicador-meta">
                        ${a.crp ? `CRP ${escapeHtml(a.crp)} · ` : ''}${escapeHtml(sprint8PerfilLabel(a.perfil))}
                    </div>
                </div>
                ${ehAtual ? '<div class="sprint8-aplicador-tag">ATUAL</div>' : '<div class="sprint8-aplicador-acao">Designar →</div>'}
            </button>
        `;
    }

    function sprint8PerfilLabel(p) {
        return (window.CortexUI?.PERFIL_LABELS?.[p]) || p;
    }

    async function sprint8DesignarAplicador(novoAplicadorId) {
        if (aplicadorAtivo?.aplicador_id === novoAplicadorId) return;

        const profAtualId = window.cortexProfissional?.id;
        if (!profAtualId) {
            window.CortexUI.toast('Erro: profissional logado não identificado.', 'danger');
            return;
        }

        try {
            // 1. Encerra vínculo atual (se houver)
            if (aplicadorAtivo?.id) {
                const { error: errEnc } = await window.cortexClient
                    .from('vinculos_paciente_aplicador')
                    .update({ ativo: false, data_fim: new Date().toISOString().split('T')[0], motivo_encerramento: 'Substituído via designação manual' })
                    .eq('id', aplicadorAtivo.id);
                if (errEnc) throw errEnc;
            }

            // 2. Cria novo vínculo
            const { error: errIns } = await window.cortexClient
                .from('vinculos_paciente_aplicador')
                .insert({
                    paciente_id: pacienteId,
                    aplicador_id: novoAplicadorId,
                    atribuido_por: profAtualId,
                    ativo: true,
                    motivo_atribuicao: aplicadorAtivo ? 'Substituição via designação' : 'Designação inicial'
                });
            if (errIns) throw errIns;

            await CortexAudit.log('atualizacao', 'vinculos_paciente_aplicador', pacienteId, {
                pacienteId,
                detalhes: { aplicador_anterior: aplicadorAtivo?.aplicador_id || null, aplicador_novo: novoAplicadorId }
            });

            window.CortexUI.toast('✓ Aplicador designado.', 'success');
            window.CortexPasta.fecharModal();

            // Recarrega vínculo e re-renderiza
            await carregarAplicadorAtivo();
            renderizarPasta();
        } catch (err) {
            console.error('[sprint8] designar:', err);
            window.CortexUI.toast('Erro: ' + (err.message || 'desconhecido'), 'danger');
        }
    }

    async function sprint8RemoverAplicador() {
        if (!aplicadorAtivo?.id) return;
        if (!confirm('Remover a designação atual? O paciente ficará sem aplicador responsável.')) return;

        try {
            const { error } = await window.cortexClient
                .from('vinculos_paciente_aplicador')
                .update({ ativo: false, data_fim: new Date().toISOString().split('T')[0], motivo_encerramento: 'Removido via interface' })
                .eq('id', aplicadorAtivo.id);
            if (error) throw error;

            await CortexAudit.log('remocao', 'vinculos_paciente_aplicador', pacienteId, {
                pacienteId,
                detalhes: { aplicador_anterior: aplicadorAtivo.aplicador_id }
            });

            window.CortexUI.toast('Designação removida.', 'success');
            window.CortexPasta.fecharModal();
            await carregarAplicadorAtivo();
            renderizarPasta();
        } catch (err) {
            console.error('[sprint8] remover designação:', err);
            window.CortexUI.toast('Erro: ' + (err.message || 'desconhecido'), 'danger');
        }
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }
    </script>
