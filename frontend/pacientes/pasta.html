<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasta do paciente — CORTEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/pacientes.css">
    <link rel="stylesheet" href="../anamnese/anamnese.css">
    <link rel="stylesheet" href="../hipoteses/hipoteses.css">
    <link rel="stylesheet" href="../relatorio_escolar/relatorio_escolar.css">
    <link rel="stylesheet" href="../checklist/checklist.css">
    <link rel="stylesheet" href="../bateria/bateria.css">
</head>
<body>
    <div class="app-shell">
        <div id="sidebar-container"></div>

        <main class="app-main">
            <a href="lista.html" class="page-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Voltar à lista de pacientes
            </a>

            <div id="pasta-conteudo">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Carregando paciente...</p>
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="foto-input-hidden" accept="image/jpeg,image/png,image/webp" style="display:none">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../shared/supabase_client.js"></script>
    <script src="../shared/auth_guard.js"></script>
    <script src="../shared/audit.js"></script>
    <script src="../shared/avatar.js"></script>
    <script src="../shared/ui_helpers.js"></script>
    <script src="../shared/sidebar.js"></script>

    <script>
    let pacienteId = null;
    let paciente = null;
    let etapaAtual = 'visao_geral';
    let anamneseExistente = null;
    let hipoteseExistente = null;
    let relatorioEscolarExistente = null;
    let checklistInfo = null;
    let bateriaInfo = null;

    const ETAPAS = [
        { id: 'visao_geral', label: 'Visão geral' },
        { id: 'anamnese', label: 'Anamnese' },
        { id: 'hipoteses', label: 'Hipóteses' },
        { id: 'checklist', label: 'Checklist' },
        { id: 'bateria', label: 'Bateria' },
        { id: 'correcao', label: 'Correção' },
        { id: 'laudo', label: 'Laudo' },
        { id: 'devolutiva', label: 'Devolutiva' }
    ];

    window.addEventListener('cortex:auth-ready', async () => {
        await CortexSidebar.render('pacientes');

        const urlParams = new URLSearchParams(window.location.search);
        pacienteId = urlParams.get('id');

        if (!pacienteId) {
            mostrarErroPasta('Paciente não especificado');
            return;
        }

        await carregarPaciente();
    });

    async function carregarPaciente() {
        const { data, error } = await window.cortexClient
            .from('vw_pacientes_lista')
            .select('*')
            .eq('id', pacienteId)
            .single();

        if (error || !data) {
            mostrarErroPasta('Paciente não encontrado');
            return;
        }

        paciente = data;
        await CortexAudit.log('leitura', 'pacientes', pacienteId, { pacienteId });

        await Promise.all([
            carregarAnamnese(),
            carregarHipotese(),
            carregarRelatorioEscolar(),
            carregarChecklistInfo(),
            carregarBateriaInfo()
        ]);
        renderizarPasta();
    }

    async function carregarAnamnese() {
        const { data, error } = await window.cortexClient
            .from('anamneses')
            .select('id, faixa_etaria, status, created_at, updated_at, aprovado_em')
            .eq('paciente_id', pacienteId)
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();

        if (!error && data) anamneseExistente = data;
    }

    async function carregarHipotese() {
        const { data, error } = await window.cortexClient
            .from('hipoteses')
            .select('id, hipoteses_iniciais, cids_sugeridos, instrumentos_sugeridos, aprovado_em, created_at, updated_at')
            .eq('paciente_id', pacienteId)
            .maybeSingle();

        if (!error && data) hipoteseExistente = data;
    }

    async function carregarRelatorioEscolar() {
        const { data, error } = await window.cortexClient
            .from('relatorios_escolares')
            .select('id, observacoes_educadores, created_at, updated_at')
            .eq('paciente_id', pacienteId)
            .maybeSingle();

        if (!error && data) relatorioEscolarExistente = data;
    }

    async function carregarChecklistInfo() {
        // O "checklist" reaproveita instrumentos_sugeridos da tabela hipoteses.
        // Aqui só queremos saber o total de instrumentos selecionados.
        const { data, error } = await window.cortexClient
            .from('hipoteses')
            .select('id, instrumentos_sugeridos, updated_at')
            .eq('paciente_id', pacienteId)
            .maybeSingle();

        if (!error && data) {
            checklistInfo = {
                total: (data.instrumentos_sugeridos || []).length,
                updated_at: data.updated_at,
                hipoteseId: data.id
            };
        }
    }

    async function carregarBateriaInfo() {
        const { data, error } = await window.cortexClient
            .from('aplicacoes_instrumento')
            .select('id, status, updated_at')
            .eq('paciente_id', pacienteId);

        if (!error && data && data.length > 0) {
            const stats = { total: data.length, aguardando: 0, em_aplicacao: 0, concluido: 0 };
            data.forEach(a => {
                if (a.status === 'aguardando') stats.aguardando++;
                else if (a.status === 'em_aplicacao') stats.em_aplicacao++;
                else if (['concluido_aplicacao', 'em_correcao', 'corrigido', 'integrado_laudo'].includes(a.status)) stats.concluido++;
            });
            const ultimaAtualizacao = data.reduce((max, a) =>
                a.updated_at > max ? a.updated_at : max, '');
            bateriaInfo = { ...stats, updated_at: ultimaAtualizacao };
        }
    }

    function mostrarErroPasta(msg) {
        document.getElementById('pasta-conteudo').innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div class="empty-state-title">${escapeHtml(msg)}</div>
                <a href="lista.html" class="btn btn-primary">Voltar à lista</a>
            </div>
        `;
    }

    async function renderizarPasta() {
        let signedUrl = null;
        if (paciente.foto_url) {
            signedUrl = await window.CortexAvatar.buscarUrlAssinada(pacienteId, paciente.foto_url);
        }
        const avatar = window.CortexAvatar.render(paciente, { tamanho: 'xl', signedUrl });
        const statusClass = window.CortexUI.STATUS_CLASSES[paciente.status] || 'status-info';
        const statusLabel = window.CortexUI.STATUS_LABELS[paciente.status] || paciente.status;

        const cabecalho = `
            <div class="pasta-cabecalho">
                <div onclick="document.getElementById('foto-input-hidden').click()" style="cursor: pointer;" title="Clique para alterar foto">
                    ${avatar}
                </div>
                <div class="pasta-info">
                    <div class="pasta-nome">${escapeHtml(paciente.nome_completo)}${paciente.nome_social ? ` <span style="font-size: 14px; color: var(--color-text-muted); font-weight: 400;">(${escapeHtml(paciente.nome_social)})</span>` : ''}</div>
                    <div class="pasta-meta">
                        <div class="pasta-meta-item">
                            <span class="pasta-meta-label">Idade:</span>
                            <span class="pasta-meta-valor">${paciente.idade_humanizada}</span>
                        </div>
                        <div class="pasta-meta-item">
                            <span class="pasta-meta-label">Sexo:</span>
                            <span class="pasta-meta-valor">${paciente.sexo}</span>
                        </div>
                        <div class="pasta-meta-item">
                            <span class="pasta-meta-label">Nascimento:</span>
                            <span class="pasta-meta-valor">${window.CortexUI.formatarDataBR(paciente.data_nascimento)}</span>
                        </div>
                        ${paciente.convenio_nome ? `
                            <div class="pasta-meta-item">
                                <span class="pasta-meta-label">Convênio:</span>
                                <span class="pasta-meta-valor">${escapeHtml(paciente.convenio_nome)}</span>
                            </div>
                        ` : ''}
                        ${paciente.aplicador_nome ? `
                            <div class="pasta-meta-item">
                                <span class="pasta-meta-label">Aplicador:</span>
                                <span class="pasta-meta-valor">${escapeHtml(paciente.aplicador_nome)}</span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="pasta-actions">
                        <span class="badge ${statusClass}">${statusLabel}</span>
                        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('foto-input-hidden').click()">
                            ${paciente.foto_url ? 'Alterar foto' : 'Adicionar foto'}
                        </button>
                        <button class="btn btn-ghost btn-sm" onclick="window.CortexUI.toast('Em breve — Sprint C1', 'info')">+ Agendar sessão</button>
                    </div>
                </div>
            </div>
        `;

        const etapasComStatus = ETAPAS.map(et => {
            let concluida = false;
            if (et.id === 'anamnese' && anamneseExistente && anamneseExistente.status === 'concluida') {
                concluida = true;
            }
            if (et.id === 'hipoteses' && hipoteseExistente && hipoteseExistente.aprovado_em) {
                concluida = true;
            }
            if (et.id === 'checklist' && checklistInfo && checklistInfo.total > 0) {
                concluida = true;
            }
            if (et.id === 'bateria' && bateriaInfo && bateriaInfo.total > 0 && bateriaInfo.concluido === bateriaInfo.total) {
                concluida = true;
            }
            return { ...et, concluida };
        });

        const etapasHtml = `
            <div class="pasta-etapas">
                ${etapasComStatus.map(et => `
                    <button
                        class="etapa ${et.id === etapaAtual ? 'ativa' : ''} ${et.concluida ? 'concluida' : ''}"
                        onclick="trocarEtapa('${et.id}')"
                    >${et.label}</button>
                `).join('')}
            </div>
        `;

        const conteudoEtapa = renderizarEtapa(etapaAtual);

        document.getElementById('pasta-conteudo').innerHTML = cabecalho + etapasHtml + conteudoEtapa;

        document.getElementById('foto-input-hidden').onchange = uploadFoto;
    }

    function trocarEtapa(novaEtapa) {
        etapaAtual = novaEtapa;
        renderizarPasta();
    }
    window.trocarEtapa = trocarEtapa;

    function renderizarEtapa(etapaId) {
        if (etapaId === 'visao_geral') return renderVisaoGeral();
        if (etapaId === 'anamnese') return renderAnamneseComRelatorio();
        if (etapaId === 'hipoteses') return renderHipoteses();
        if (etapaId === 'checklist') return renderChecklist();
        if (etapaId === 'bateria') return renderBateria();
        if (etapaId === 'correcao') {
            // Dispara carga assíncrona; substitui o conteúdo quando pronto
            setTimeout(() => carregarERenderCorrecao(), 0);
            return `
                <div class="etapa-content" id="correcao-container">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">⏳</div>
                        <h3>Carregando dashboard de correção...</h3>
                    </div>
                </div>
            `;
        }
        if (etapaId === 'devolutiva') {
            return `
                <div class="etapa-content">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">🚧</div>
                        <h3>Em construção</h3>
                        <p>A etapa de Devolutiva estará disponível em breve.</p>
                    </div>
                </div>
            `;
        }

        // laudo (Sprint 3 — em breve) e qualquer outra
        const sprints = {
            'laudo': 'Sprint 3'
        };

        const labelEtapa = ETAPAS.find(e => e.id === etapaId)?.label || etapaId;
        const sprintInfo = sprints[etapaId] || 'próximo sprint';

        return `
            <div class="etapa-content">
                <div class="etapa-placeholder">
                    <div class="etapa-placeholder-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <h3>${labelEtapa}</h3>
                    <p>Esta etapa será construída no <strong>${sprintInfo}</strong>.</p>
                </div>
            </div>
        `;
    }

    // ============================================================================
    // CORREÇÃO — Dashboard de status dos instrumentos da bateria
    // ============================================================================

    // Helpers (espelham bateria.js — mesma convenção de URL)
    function correcaoSiglaParaSlug(sigla) {
        return String(sigla || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }
    const CORRECAO_URL_OVERRIDES_RESULTADO = {
        'SCARED-A': '../correcao/scared/scared_resultado.html',
        'SCARED-H': '../correcao/scared/scared_resultado.html'
    };
    // Whitelist de retrocompatibilidade (espelha bateria.js — testes legados)
    const CORRECAO_WHITELIST_RESULTADO = ['RAADS-R'];

    function correcaoMontarUrlResultado(sigla, aplicacaoId) {
        let base = CORRECAO_URL_OVERRIDES_RESULTADO[sigla];
        if (!base) {
            const slug = correcaoSiglaParaSlug(sigla);
            if (!slug) return null;
            base = `../correcao/${slug}/${slug}_resultado.html`;
        }
        return `${base}?aplicacao_id=${aplicacaoId}`;
    }

    function correcaoTemPaginaResultado(inst) {
        if (!inst) return false;
        if (CORRECAO_WHITELIST_RESULTADO.includes(inst.sigla)) return true;
        if (inst.tipo_aplicacao === 'presencial') {
            return inst.permite_correcao_sistema === true;
        }
        return inst.permite_aplicacao_online === true
            && inst.permite_correcao_sistema === true;
    }

    async function carregarERenderCorrecao() {
        const container = document.getElementById('correcao-container');
        if (!container) return;

        try {
            const { data, error } = await window.cortexClient
                .from('aplicacoes_instrumento')
                .select(`
                    id, status, modalidade, data_aplicacao, data_conclusao,
                    link_unico, link_acessado_em, updated_at, created_at,
                    instrumentos_catalogo (
                        sigla, nome_completo, tipo_aplicacao,
                        permite_aplicacao_online, permite_correcao_sistema
                    )
                `)
                .eq('paciente_id', pacienteId)
                .order('created_at', { ascending: true });

            if (error) throw error;

            container.innerHTML = renderCorrecao(data || []);
        } catch (err) {
            console.error('[correcao] erro ao carregar:', err);
            container.innerHTML = `
                <div class="etapa-placeholder">
                    <div class="etapa-placeholder-icon">⚠</div>
                    <h3>Erro ao carregar</h3>
                    <p>${escapeHtml(err.message || 'erro desconhecido')}</p>
                </div>
            `;
        }
    }

    function renderCorrecao(aplicacoes) {
        if (aplicacoes.length === 0) {
            return `
                <div class="etapa-placeholder">
                    <div class="etapa-placeholder-icon">📋</div>
                    <h3>Nenhum instrumento na bateria</h3>
                    <p style="margin-bottom: 18px;">Selecione testes no Checklist e inicie a Bateria para ver o status aqui.</p>
                    <a href="../checklist/checklist.html?paciente=${pacienteId}" class="btn btn-primary">Ir para Checklist</a>
                </div>
            `;
        }

        // Classifica cada aplicação em um dos 3 grupos
        const corrigidos = [];
        const aguardandoCorrecao = [];
        const onlineAguardando = [];

        for (const apl of aplicacoes) {
            const inst = apl.instrumentos_catalogo;
            const sigla = inst?.sigla || '?';
            const ehOnline = apl.modalidade === 'online'
                || (inst?.permite_aplicacao_online && inst?.tipo_aplicacao !== 'presencial');

            if (apl.status === 'corrigido' || apl.status === 'integrado_laudo') {
                corrigidos.push(apl);
            } else if (ehOnline && (apl.status === 'aguardando' || apl.status === 'em_aplicacao')) {
                onlineAguardando.push(apl);
            } else {
                aguardandoCorrecao.push(apl);
            }
        }

        const total = aplicacoes.length;
        const pctConcluido = Math.round((corrigidos.length / total) * 100);

        return `
            <div class="correcao-dashboard">

                <!-- Resumo -->
                <div class="correcao-resumo">
                    <div class="correcao-resumo-info">
                        <h3 style="margin: 0 0 6px 0;">Instrumentos da bateria (${total})</h3>
                        <p style="margin: 0; color: var(--color-text-muted); font-size: 13px;">
                            ${corrigidos.length} de ${total} já corrigidos (${pctConcluido}%)
                        </p>
                    </div>
                    <div class="correcao-resumo-progress">
                        <div class="correcao-resumo-progress-bar" style="width: ${pctConcluido}%;"></div>
                    </div>
                </div>

                <!-- ✅ Corrigidos -->
                ${corrigidos.length > 0 ? `
                    <div class="correcao-grupo">
                        <h4 class="correcao-grupo-titulo" style="color: #059669;">
                            ✅ Corrigidos
                            <span class="correcao-grupo-contador">${corrigidos.length}</span>
                        </h4>
                        <div class="correcao-lista">
                            ${corrigidos.map(apl => renderCorrecaoLinhaCorrigido(apl)).join('')}
                        </div>
                    </div>
                ` : ''}

                <!-- ⏳ Aguardando correção (presencial / sem link) -->
                ${aguardandoCorrecao.length > 0 ? `
                    <div class="correcao-grupo">
                        <h4 class="correcao-grupo-titulo" style="color: #d97706;">
                            ⏳ Aguardando correção
                            <span class="correcao-grupo-contador">${aguardandoCorrecao.length}</span>
                        </h4>
                        <div class="correcao-lista">
                            ${aguardandoCorrecao.map(apl => renderCorrecaoLinhaPendente(apl)).join('')}
                        </div>
                    </div>
                ` : ''}

                <!-- 📲 Online aguardando paciente -->
                ${onlineAguardando.length > 0 ? `
                    <div class="correcao-grupo">
                        <h4 class="correcao-grupo-titulo" style="color: #1d4ed8;">
                            📲 Online — aguardando paciente
                            <span class="correcao-grupo-contador">${onlineAguardando.length}</span>
                        </h4>
                        <div class="correcao-lista">
                            ${onlineAguardando.map(apl => renderCorrecaoLinhaOnline(apl)).join('')}
                        </div>
                    </div>
                ` : ''}

                <!-- Atalho para Bateria -->
                <div style="margin-top: 22px; text-align: center;">
                    <a href="../bateria/bateria.html?paciente=${pacienteId}" class="btn btn-secondary">
                        🎯 Ir para a Bateria
                    </a>
                </div>

            </div>
        `;
    }

    function renderCorrecaoLinhaCorrigido(apl) {
        const inst = apl.instrumentos_catalogo;
        const sigla = inst?.sigla || '?';
        const nome = inst?.nome_completo || sigla;
        const dataConcl = apl.data_conclusao
            ? formatarDataHora(apl.data_conclusao)
            : (apl.updated_at ? formatarDataHora(apl.updated_at) : '—');

        const podeVer = correcaoTemPaginaResultado(inst);
        const url = podeVer ? correcaoMontarUrlResultado(sigla, apl.id) : null;

        return `
            <div class="correcao-item correcao-item-ok">
                <div class="correcao-item-info">
                    <div class="correcao-item-sigla">${escapeHtml(sigla)}</div>
                    <div class="correcao-item-nome">${escapeHtml(nome)}</div>
                    <div class="correcao-item-meta">Corrigido em ${dataConcl}</div>
                </div>
                <div class="correcao-item-acoes">
                    ${url ? `
                        <a class="btn btn-primary btn-sm" href="${url}">📊 Ver resultado</a>
                    ` : `
                        <span style="font-size: 12px; color: var(--color-text-muted); font-style: italic;">Sem página de resultado</span>
                    `}
                </div>
            </div>
        `;
    }

    function renderCorrecaoLinhaPendente(apl) {
        const inst = apl.instrumentos_catalogo;
        const sigla = inst?.sigla || '?';
        const nome = inst?.nome_completo || sigla;
        const tipo = inst?.tipo_aplicacao === 'presencial' ? 'Presencial' : 'Online';
        const statusLabel = {
            'aguardando': 'Aguardando aplicação',
            'em_aplicacao': 'Em aplicação',
            'concluido_aplicacao': 'Aplicado — aguardando correção',
            'em_correcao': 'Em correção',
        }[apl.status] || apl.status;

        return `
            <div class="correcao-item correcao-item-pend">
                <div class="correcao-item-info">
                    <div class="correcao-item-sigla">${escapeHtml(sigla)}</div>
                    <div class="correcao-item-nome">${escapeHtml(nome)}</div>
                    <div class="correcao-item-meta">${tipo} — ${escapeHtml(statusLabel)}</div>
                </div>
                <div class="correcao-item-acoes">
                    <a class="btn btn-secondary btn-sm" href="../bateria/bateria.html?paciente=${pacienteId}">Ir para a Bateria</a>
                </div>
            </div>
        `;
    }

    function renderCorrecaoLinhaOnline(apl) {
        const inst = apl.instrumentos_catalogo;
        const sigla = inst?.sigla || '?';
        const nome = inst?.nome_completo || sigla;

        let metaTxt = '';
        if (apl.link_acessado_em) {
            metaTxt = `Link acessado em ${formatarDataHora(apl.link_acessado_em)}`;
        } else if (apl.link_unico) {
            metaTxt = `Link enviado em ${formatarDataHora(apl.updated_at || apl.created_at)}`;
        } else {
            metaTxt = 'Aguardando geração de link';
        }

        return `
            <div class="correcao-item correcao-item-online">
                <div class="correcao-item-info">
                    <div class="correcao-item-sigla">${escapeHtml(sigla)}</div>
                    <div class="correcao-item-nome">${escapeHtml(nome)}</div>
                    <div class="correcao-item-meta">${escapeHtml(metaTxt)}</div>
                </div>
                <div class="correcao-item-acoes">
                    <a class="btn btn-secondary btn-sm" href="../bateria/bateria.html?paciente=${pacienteId}">Gerenciar link</a>
                </div>
            </div>
        `;
    }

    function renderVisaoGeral() {
        return `
            <div class="etapa-content">
                <h3>Visão geral</h3>
                <div class="campos-grid">
                    ${campo('Telefone', paciente.telefone)}
                    ${campo('E-mail', paciente.email)}
                    ${campo('CPF', paciente.cpf)}
                    ${campo('Endereço', paciente.endereco)}
                    ${campo('Cidade', paciente.cidade)}
                    ${campo('Encaminhado por', paciente.encaminhado_por)}
                    ${campo('Médico de referência', paciente.medico_referencia)}
                    ${paciente.responsavel_nome ? campo('Responsável', `${paciente.responsavel_nome} (${paciente.responsavel_parentesco || 'sem parentesco'})`) : ''}
                </div>
            </div>
        `;
    }

    function renderAnamneseComRelatorio() {
        return `
            <div class="etapa-content">
                ${renderCardAnamnese()}
                ${renderCardRelatorioEscolar()}
            </div>
        `;
    }

    function renderCardAnamnese() {
        if (!anamneseExistente) {
            const idadeAnos = paciente.idade_anos;
            let faixaSugerida = 'Adulto';
            if (idadeAnos < 6) faixaSugerida = 'Primeira Infância (0–6 anos)';
            else if (idadeAnos < 12) faixaSugerida = 'Segunda Infância (6–12 anos)';
            else if (idadeAnos < 18) faixaSugerida = 'Adolescência (12–18 anos)';
            else if (idadeAnos < 50) faixaSugerida = 'Adulto (18–50 anos)';
            else faixaSugerida = 'Idoso (50+ anos)';

            return `
                <div class="etapa-placeholder">
                    <div class="etapa-placeholder-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </div>
                    <h3>Anamnese ainda não iniciada</h3>
                    <p style="margin-bottom: 18px;">Com base na idade do paciente (${paciente.idade_humanizada}), o formulário sugerido é:<br><strong>${faixaSugerida}</strong></p>
                    <a href="../anamnese/anamnese.html?paciente=${pacienteId}" class="btn btn-primary btn-lg">
                        Iniciar anamnese
                    </a>
                </div>
            `;
        }

        const FAIXAS_LABELS = {
            'infantil': 'Primeira Infância (0–6 anos)',
            'escolar': 'Segunda Infância (6–12 anos)',
            'adolescente': 'Adolescência (12–18 anos)',
            'adulto': 'Adulto (18–50 anos)',
            'idoso': 'Idoso (50+ anos)'
        };

        const faixaLabel = FAIXAS_LABELS[anamneseExistente.faixa_etaria] || anamneseExistente.faixa_etaria;
        const isFinalizada = anamneseExistente.status === 'concluida';

        if (isFinalizada) {
            return `
                <div class="anamnese-card-resumo">
                    <div class="anamnese-card-resumo-icone anamnese-card-resumo-icone-success">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div class="anamnese-card-resumo-info">
                        <h3>Anamnese finalizada</h3>
                        <p><strong>Formulário:</strong> ${faixaLabel}</p>
                        <p><strong>Finalizada em:</strong> ${formatarDataHora(anamneseExistente.updated_at)}</p>
                    </div>
                    <div class="anamnese-card-resumo-acoes">
                        <a href="../anamnese/anamnese.html?id=${anamneseExistente.id}" class="btn btn-secondary">Visualizar</a>
                    </div>
                </div>
            `;
        }

        return `
            <div class="anamnese-card-resumo">
                <div class="anamnese-card-resumo-icone anamnese-card-resumo-icone-warning">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                    </svg>
                </div>
                <div class="anamnese-card-resumo-info">
                    <h3>Anamnese em rascunho</h3>
                    <p><strong>Formulário:</strong> ${faixaLabel}</p>
                    <p><strong>Última edição:</strong> ${formatarDataHora(anamneseExistente.updated_at)}</p>
                </div>
                <div class="anamnese-card-resumo-acoes">
                    <a href="../anamnese/anamnese.html?id=${anamneseExistente.id}" class="btn btn-primary">
                        Continuar anamnese
                    </a>
                </div>
            </div>
        `;
    }

    function renderCardRelatorioEscolar() {
        // Se não foi cadastrado ainda
        if (!relatorioEscolarExistente) {
            return `
                <div class="relatorio-card-resumo" style="margin-top: 14px;">
                    <div class="relatorio-card-resumo-icone">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                    </div>
                    <div class="relatorio-card-resumo-info">
                        <h3>📚 Relatório Escolar</h3>
                        <p style="color: var(--color-text-muted);">
                            Cole aqui o relatório que a escola enviou para complementar a anamnese.
                        </p>
                    </div>
                    <div class="relatorio-card-resumo-acoes">
                        <a href="../relatorio_escolar/relatorio_escolar.html?paciente=${pacienteId}" class="btn btn-secondary">
                            Adicionar
                        </a>
                    </div>
                </div>
            `;
        }

        // Tem relatório registrado
        const conteudo = relatorioEscolarExistente.observacoes_educadores || '';
        const preview = conteudo.length > 0
            ? conteudo.substring(0, 200) + (conteudo.length > 200 ? '...' : '')
            : null;

        return `
            <div class="relatorio-card-resumo" style="margin-top: 14px;">
                <div class="relatorio-card-resumo-icone">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <div class="relatorio-card-resumo-info">
                    <h3>📚 Relatório Escolar</h3>
                    <p><strong>Última edição:</strong> ${formatarDataHora(relatorioEscolarExistente.updated_at)}</p>
                    ${preview ? `<div class="resumo-preview">${escapeHtml(preview)}</div>` : `<p style="color: var(--color-text-muted); font-style: italic;">Documento ainda sem conteúdo.</p>`}
                </div>
                <div class="relatorio-card-resumo-acoes">
                    <a href="../relatorio_escolar/relatorio_escolar.html?paciente=${pacienteId}" class="btn btn-primary">
                        Editar relatório
                    </a>
                </div>
            </div>
        `;
    }

    function renderBateria() {
        if (!bateriaInfo || bateriaInfo.total === 0) {
            const totalChecklist = checklistInfo ? checklistInfo.total : 0;
            if (totalChecklist === 0) {
                return `
                    <div class="etapa-content">
                        <div class="etapa-placeholder">
                            <div class="etapa-placeholder-icon">🎯</div>
                            <h3>Bateria sem instrumentos</h3>
                            <p style="margin-bottom: 18px;">É necessário primeiro selecionar testes no Checklist.</p>
                            <a href="../checklist/checklist.html?paciente=${pacienteId}" class="btn btn-primary">Ir para Checklist</a>
                        </div>
                    </div>
                `;
            }
            return `
                <div class="etapa-content">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">🎯</div>
                        <h3>Bateria pronta para iniciar</h3>
                        <p style="margin-bottom: 18px;">${totalChecklist} testes selecionados no checklist. Abra a bateria para carregá-los automaticamente.</p>
                        <a href="../bateria/bateria.html?paciente=${pacienteId}" class="btn btn-primary btn-lg">Iniciar bateria</a>
                    </div>
                </div>
            `;
        }

        const todosConcluidos = bateriaInfo.concluido === bateriaInfo.total;
        const cor = todosConcluidos ? 'var(--primary-green)' : 'var(--primary-blue)';

        return `
            <div class="etapa-content">
                <div class="bateria-card-resumo">
                    <div class="bateria-card-icone">${todosConcluidos ? '✓' : '🎯'}</div>
                    <div class="bateria-card-info">
                        <h3>${todosConcluidos ? 'Bateria concluída' : 'Bateria em andamento'}</h3>
                        <p><strong>Última atualização:</strong> ${formatarDataHora(bateriaInfo.updated_at)}</p>
                        <div class="bateria-mini-stats">
                            <div class="bateria-mini-stat">
                                <span class="bateria-mini-stat-num" style="color: var(--color-warning-text);">${bateriaInfo.aguardando}</span>
                                <span class="bateria-mini-stat-label">Aguardando</span>
                            </div>
                            <div class="bateria-mini-stat">
                                <span class="bateria-mini-stat-num" style="color: var(--primary-blue);">${bateriaInfo.em_aplicacao}</span>
                                <span class="bateria-mini-stat-label">Em aplicação</span>
                            </div>
                            <div class="bateria-mini-stat">
                                <span class="bateria-mini-stat-num" style="color: var(--primary-green);">${bateriaInfo.concluido}</span>
                                <span class="bateria-mini-stat-label">Concluídos</span>
                            </div>
                            <div class="bateria-mini-stat">
                                <span class="bateria-mini-stat-num">${bateriaInfo.total}</span>
                                <span class="bateria-mini-stat-label">Total</span>
                            </div>
                        </div>
                    </div>
                    <div class="hipoteses-card-resumo-acoes">
                        <a href="../bateria/bateria.html?paciente=${pacienteId}" class="btn btn-primary">
                            ${todosConcluidos ? 'Visualizar' : 'Continuar'}
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function renderChecklist() {
        const total = checklistInfo ? checklistInfo.total : 0;

        if (total === 0) {
            return `
                <div class="etapa-content">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                <path d="M9 11l3 3L22 4"/>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                            </svg>
                        </div>
                        <h3>Checklist ainda não preenchido</h3>
                        <p style="margin-bottom: 18px;">Selecione os instrumentos que serão aplicados ao paciente. A lista é filtrada automaticamente pela idade.</p>
                        <a href="../checklist/checklist.html?paciente=${pacienteId}" class="btn btn-primary btn-lg">
                            Abrir checklist
                        </a>
                    </div>
                </div>
            `;
        }

        return `
            <div class="etapa-content">
                <div class="checklist-card-resumo">
                    <div class="checklist-card-icone">📋</div>
                    <div class="checklist-card-info">
                        <h3>Checklist com ${total} instrumento${total === 1 ? '' : 's'}</h3>
                        <p><strong>Última atualização:</strong> ${formatarDataHora(checklistInfo.updated_at)}</p>
                        <p style="color: var(--color-text-muted); margin-top: 4px;">Os instrumentos selecionados estão prontos para aplicação na etapa Bateria.</p>
                    </div>
                    <div class="hipoteses-card-resumo-acoes">
                        <a href="../checklist/checklist.html?paciente=${pacienteId}" class="btn btn-primary">
                            Editar / Imprimir
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function renderHipoteses() {
        const anamneseFinalizada = anamneseExistente && anamneseExistente.status === 'concluida';

        if (!hipoteseExistente) {
            return `
                <div class="etapa-content">
                    <div class="etapa-placeholder">
                        <div class="etapa-placeholder-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                            </svg>
                        </div>
                        <h3>Hipóteses ainda não levantadas</h3>
                        ${!anamneseFinalizada ? `
                            <p style="margin-bottom: 18px; color: var(--color-warning-text);">⚠️ Recomendamos finalizar a anamnese antes de levantar hipóteses.</p>
                        ` : `
                            <p style="margin-bottom: 18px;">A partir da anamnese, defina as hipóteses diagnósticas iniciais para guiar a bateria de avaliação.</p>
                        `}
                        <a href="../hipoteses/hipoteses.html?paciente=${pacienteId}" class="btn btn-primary btn-lg">
                            Iniciar hipóteses
                        </a>
                    </div>
                </div>
            `;
        }

        const numCids = (hipoteseExistente.cids_sugeridos || []).length;
        const numInst = (hipoteseExistente.instrumentos_sugeridos || []).length;
        const aprovada = !!hipoteseExistente.aprovado_em;

        if (aprovada) {
            return `
                <div class="etapa-content">
                    <div class="hipoteses-card-resumo">
                        <div class="hipoteses-card-resumo-icone hipoteses-card-resumo-icone-success">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                        <div class="hipoteses-card-resumo-info">
                            <h3>Hipóteses aprovadas</h3>
                            <p><strong>Aprovadas em:</strong> ${formatarDataHora(hipoteseExistente.aprovado_em)}</p>
                            <p style="color: var(--color-text-muted); margin-top: 4px;">Bloqueado para edição.</p>
                            <div class="hipoteses-mini-stats">
                                <div class="hipoteses-mini-stat">
                                    <span class="hipoteses-mini-stat-num">${numCids}</span>
                                    <span class="hipoteses-mini-stat-label">CIDs/DSM</span>
                                </div>
                                <div class="hipoteses-mini-stat">
                                    <span class="hipoteses-mini-stat-num">${numInst}</span>
                                    <span class="hipoteses-mini-stat-label">Instrumentos</span>
                                </div>
                            </div>
                        </div>
                        <div class="hipoteses-card-resumo-acoes">
                            <a href="../hipoteses/hipoteses.html?paciente=${pacienteId}" class="btn btn-secondary">Visualizar</a>
                        </div>
                    </div>
                </div>
            `;
        }

        return `
            <div class="etapa-content">
                <div class="hipoteses-card-resumo">
                    <div class="hipoteses-card-resumo-icone hipoteses-card-resumo-icone-warning">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                        </svg>
                    </div>
                    <div class="hipoteses-card-resumo-info">
                        <h3>Hipóteses em rascunho</h3>
                        <p><strong>Última edição:</strong> ${formatarDataHora(hipoteseExistente.updated_at)}</p>
                        <div class="hipoteses-mini-stats">
                            <div class="hipoteses-mini-stat">
                                <span class="hipoteses-mini-stat-num">${numCids}</span>
                                <span class="hipoteses-mini-stat-label">CIDs/DSM</span>
                            </div>
                            <div class="hipoteses-mini-stat">
                                <span class="hipoteses-mini-stat-num">${numInst}</span>
                                <span class="hipoteses-mini-stat-label">Instrumentos</span>
                            </div>
                        </div>
                    </div>
                    <div class="hipoteses-card-resumo-acoes">
                        <a href="../hipoteses/hipoteses.html?paciente=${pacienteId}" class="btn btn-primary">
                            Continuar
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function campo(label, valor) {
        return `
            <div class="campo">
                <div class="campo-label">${label}</div>
                <div class="campo-valor">${escapeHtml(valor || '—')}</div>
            </div>
        `;
    }

    function formatarDataHora(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yyyy = d.getFullYear();
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${dd}/${mm}/${yyyy} às ${hh}:${mi}`;
    }

    async function uploadFoto(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (file.size > 2 * 1024 * 1024) {
            window.CortexUI.toast('Arquivo muito grande. Máximo: 2MB.', 'danger');
            return;
        }

        if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
            window.CortexUI.toast('Formato não suportado. Use JPG, PNG ou WEBP.', 'danger');
            return;
        }

        window.CortexUI.toast('Enviando foto...', 'info');

        const ext = file.name.split('.').pop().toLowerCase();
        const path = `${pacienteId}/perfil.${ext}`;

        try {
            const { error: uploadError } = await window.cortexClient
                .storage
                .from('pacientes-fotos')
                .upload(path, file, { upsert: true, contentType: file.type });

            if (uploadError) throw uploadError;

            const { error: updateError } = await window.cortexClient
                .from('pacientes')
                .update({ foto_url: path })
                .eq('id', pacienteId);

            if (updateError) throw updateError;

            await CortexAudit.log('edicao', 'pacientes', pacienteId, {
                pacienteId,
                detalhes: { campo: 'foto_url' }
            });

            window.CortexUI.toast('Foto enviada com sucesso!', 'success');

            paciente.foto_url = path;
            renderizarPasta();

        } catch (err) {
            console.error('Erro no upload:', err);
            window.CortexUI.toast('Erro ao enviar foto: ' + err.message, 'danger');
        }
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }
    </script>
